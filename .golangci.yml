version: "2"

run:
  timeout: 5m
  go: '1.25'

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unused

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
      - path: proto/
        linters:
          - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/seanbao/mnemonas

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
