name: Torture

on:
  workflow_dispatch:
    inputs:
      fuzztime:
        description: Go fuzz duration per target
        required: false
        default: 10s
  schedule:
    - cron: '17 18 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.9'
  RUST_VERSION: '1.92'
  NODE_VERSION: '22'

jobs:
  safe-torture:
    name: Safe Torture Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dataplane

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Install Playwright browser
        run: npm --prefix web exec -- playwright install --with-deps chromium

      - name: Run non-destructive torture matrix
        env:
          GO_FUZZTIME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fuzztime || '10s' }}
          MNEMONAS_E2E_ROOT: ${{ runner.temp }}/mnemonas-torture
          RUN_LIVE_FAULTS: '0'
        run: make test-torture

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: torture-playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
