name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25.10'
  RUST_VERSION: '1.92'
  NODE_VERSION: '22'
  PROTOC_VERSION: '3.20.1'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.6.1'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
          - os: darwin
            arch: amd64
            runner: macos-latest
            rust_target: x86_64-apple-darwin
          - os: darwin
            arch: arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate release tag
        run: |
          case "$GITHUB_REF_NAME" in
            ""|*[!A-Za-z0-9._-]*)
              echo "Release tag contains unsupported characters: $GITHUB_REF_NAME" >&2
              exit 1
              ;;
          esac

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.rust_target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Generate protobuf
        run: make proto

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Set build metadata
        id: build_meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          BUILD_TIME: ${{ steps.build_meta.outputs.build_time }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o dist/nasd-${{ matrix.os }}-${{ matrix.arch }} ./cmd/nasd

      - name: Build Rust binary
        working-directory: dataplane
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --locked --target ${{ matrix.rust_target }}
          cp target/${{ matrix.rust_target }}/release/dataplane \
            ../dist/dataplane-${{ matrix.os }}-${{ matrix.arch }}

      - name: Create archive
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          package_name="mnemonas-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          rm -rf dist/package "dist/$package_name"
          mkdir -p "dist/$package_name/web" "dist/$package_name/scripts" "dist/$package_name/docs" "dist/$package_name/deploy"
          install -m 755 dist/nasd-${{ matrix.os }}-${{ matrix.arch }} "dist/$package_name/nasd"
          install -m 755 dist/dataplane-${{ matrix.os }}-${{ matrix.arch }} "dist/$package_name/dataplane"
          cp -R web/dist/. "dist/$package_name/web/"
          install -m 755 scripts/*.sh "dist/$package_name/scripts/"
          cp -R docs/. "dist/$package_name/docs/"
          cp -R deploy/. "dist/$package_name/deploy/"
          install -m 644 docker-compose.yml .env.example "dist/$package_name/"
          release_image="ghcr.io/${GITHUB_REPOSITORY}:${VERSION#v}"
          awk -v image="$release_image" -v version="$VERSION" '
            /^MNEMONAS_IMAGE=/ { print "MNEMONAS_IMAGE=" image; next }
            /^MNEMONAS_VERSION=/ { print "MNEMONAS_VERSION=" version; next }
            { print }
          ' "dist/$package_name/.env.example" > "dist/$package_name/.env.example.tmp"
          mv "dist/$package_name/.env.example.tmp" "dist/$package_name/.env.example"
          install -m 644 mnemonas.example.toml README.md README.en.md CHANGELOG.md CHANGELOG.en.md SECURITY.md SECURITY.zh-CN.md SUPPORT.md SUPPORT.en.md LICENSE "dist/$package_name/"
          tar -czvf "dist/mnemonas-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            -C dist \
            "$package_name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnemonas-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Set build metadata
        id: build_meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
