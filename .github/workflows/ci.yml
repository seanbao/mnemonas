name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.9'
  RUST_VERSION: '1.92'
  NODE_VERSION: '22'
  PROTOC_VERSION: '3.20.1'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.6.1'
  GOLANGCI_LINT_VERSION: 'v2.11.4'
  GOVULNCHECK_VERSION: 'v1.3.0'
  CARGO_AUDIT_VERSION: '0.22.1'

jobs:
  scripts:
    name: Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate deployment scripts
        run: make scripts-check

  # Go 代码检查和测试
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}

      - name: Generate protobuf
        run: make proto

      - name: Check generated protobuf is committed
        run: git diff --exit-code -- proto/dataplane.pb.go proto/dataplane_grpc.pb.go dataplane/src/proto/mnemonas.dataplane.v1.rs

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: Test
        run: |
          packages=$(go list ./... | grep -v '/web/node_modules/')
          CGO_ENABLED=1 bash ./scripts/with-test-dataplane.sh go test -v -race -coverprofile=coverage.out $packages

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          packages=$(go list ./... | grep -v '/web/node_modules/')
          "$(go env GOPATH)/bin/govulncheck" $packages

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: go
          fail_ci_if_error: false

  # Rust 代码检查和测试
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: dataplane
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            dataplane
            tools/proto-gen

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --all-features --locked

      - name: Proto generator format check
        working-directory: tools/proto-gen
        run: cargo fmt --check

      - name: Proto generator clippy
        working-directory: tools/proto-gen
        run: cargo clippy --locked -- -D warnings

      - name: Proto generator test
        working-directory: tools/proto-gen
        run: cargo test --locked

      - name: Install cargo-audit
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: cargo install cargo-audit --version "${{ env.CARGO_AUDIT_VERSION }}" --locked

      - name: Dependency audit
        run: cargo audit

      - name: Proto generator dependency audit
        working-directory: tools/proto-gen
        run: cargo audit

      - name: Build
        run: cargo build --release --locked

  # 前端测试
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: web/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # Docker 构建测试
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build metadata
        id: build_meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mnemonas:test
          build-args: |
            VERSION=ci
            BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          set -euo pipefail

          docker run -d --name mnemonas-smoke -p 18080:8080 mnemonas:test >/dev/null
          cleanup() {
            status=$?
            if [ $status -ne 0 ]; then
              docker logs mnemonas-smoke || true
            fi
            docker rm -f mnemonas-smoke >/dev/null 2>&1 || true
            exit $status
          }
          trap cleanup EXIT

          for _ in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              curl -fsS http://127.0.0.1:18080/health | grep -q '"version":"ci"'
              curl -fsS -H 'Accept: text/html' http://127.0.0.1:18080/ | grep -q 'id="root"'
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx 'mnemonas-smoke'; then
              echo "mnemonas smoke container exited before becoming healthy" >&2
              exit 1
            fi

            sleep 1
          done

          echo "timed out waiting for mnemonas smoke container health endpoint" >&2
          exit 1
