name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.11'
  RUST_VERSION: '1.92'
  NODE_VERSION: '22'
  PROTOC_VERSION: '3.20.1'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.6.1'
  GOLANGCI_LINT_VERSION: 'v2.11.4'
  GOVULNCHECK_VERSION: 'v1.3.0'
  CARGO_AUDIT_VERSION: '0.22.1'
  NPM_AUDIT_LEVEL: 'moderate'
  GO_COVERAGE_MIN: '75'

jobs:
  workflows:
    name: Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install YAML validation dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-yaml

      - name: Validate GitHub Actions workflows
        run: make workflows-check

  scripts:
    name: Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install script validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-yaml

      - name: Validate deployment scripts
        run: make scripts-check

  toolchains:
    name: Toolchains
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate pinned toolchain versions
        run: make toolchains-check

  # Documentation checks
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install documentation validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-yaml

      - name: Validate documentation
        run: make docs-check

  # Go linting and tests
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}

      - name: Generate protobuf
        run: make proto

      - name: Check generated protobuf is committed
        run: git diff --exit-code -- proto/dataplane.pb.go proto/dataplane_grpc.pb.go dataplane/src/proto/mnemonas.dataplane.v1.rs

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: Test
        run: |
          mapfile -t packages < <(make --no-print-directory go-packages)
          CGO_ENABLED=1 bash ./scripts/with-test-dataplane.sh go test -v -race -coverprofile=coverage.out "${packages[@]}"
          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ { gsub("%", "", $3); print $3 }')
          awk -v coverage="$coverage" -v min="${GO_COVERAGE_MIN}" 'BEGIN {
            if ((coverage + 0) < (min + 0)) {
              printf "Go coverage %.1f%% is below %.1f%%\n", coverage, min
              exit 1
            }
            printf "Go coverage %.1f%% meets %.1f%%\n", coverage, min
          }'

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          mapfile -t packages < <(make --no-print-directory go-packages)
          "$(go env GOPATH)/bin/govulncheck" "${packages[@]}"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: go
          fail_ci_if_error: false

  # Rust linting and tests
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: dataplane
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            dataplane
            tools/proto-gen

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --all-features --locked

      - name: Proto generator format check
        working-directory: tools/proto-gen
        run: cargo fmt --check

      - name: Proto generator clippy
        working-directory: tools/proto-gen
        run: cargo clippy --locked -- -D warnings

      - name: Proto generator test
        working-directory: tools/proto-gen
        run: cargo test --locked

      - name: Install cargo-audit
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: cargo install cargo-audit --version "${{ env.CARGO_AUDIT_VERSION }}" --locked

      - name: Dependency audit
        run: cargo audit

      - name: Proto generator dependency audit
        working-directory: tools/proto-gen
        run: cargo audit

      - name: Build
        run: cargo build --release --locked

  # Frontend tests
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level="${{ env.NPM_AUDIT_LEVEL }}"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: web/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # Browser end-to-end tests
  e2e:
    name: E2E Browser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dataplane

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          MNEMONAS_E2E_ROOT: ${{ runner.temp }}/mnemonas-playwright
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore

  # Docker build smoke test
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build metadata
        id: build_meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mnemonas:test
          build-args: |
            VERSION=ci
            BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        env:
          MNEMONAS_DOCKER_SMOKE_CONTAINER: mnemonas-smoke
          MNEMONAS_DOCKER_SMOKE_EXPECT_VERSION: ci
        run: ./scripts/docker-smoke.sh mnemonas:test
