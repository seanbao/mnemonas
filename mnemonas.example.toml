# MnemoNAS 配置文件示例

[server]
host = "0.0.0.0"
port = 8080
read_timeout = "30s"
write_timeout = "60s"
idle_timeout = "120s"
trusted_proxy_hops = 0        # 默认不信任 X-Forwarded-*；反向代理后方部署时设置为实际代理层数

[server.tls]
enabled = false              # 启用 HTTPS
cert_file = ""               # 证书文件路径（留空使用 cert_dir 下的 server.crt）
key_file = ""                # 私钥文件路径（留空使用 cert_dir 下的 server.key）
auto_generate = true         # 自动生成自签名证书（适合内网/开发环境）
cert_dir = ""                # 证书存放目录（默认 ~/.mnemonas/.mnemonas/certs）

[storage]
# 存储根目录，默认 ~/.mnemonas（无需 root 权限）
root = "~/.mnemonas"

[storage.retention]
max_versions = 50            # 每个文件最多保留50个版本
max_age = "2160h"            # 版本保留90天
min_free_space = 10737418240 # 最少保留10GB空闲空间
gc_interval = "24h"          # 每24小时运行一次版本清理

[storage.versioning]
auto_versioned_extensions = [".md", ".txt", ".go", ".rs", ".toml", ".yaml", ".json"]
auto_versioned_filenames = ["README", "LICENSE", "CHANGELOG", "Dockerfile", "Makefile"]
max_versioned_size = 104857600 # 100MB

[storage.trash]
enabled = true
retention_days = 30
max_size = 10737418240         # 10GB

[dataplane]
grpc_address = "127.0.0.1:9090"
timeout = "30s"
max_retries = 3

[dataplane.cdc]
min_chunk_size = 262144      # 256KB
avg_chunk_size = 1048576     # 1MB
max_chunk_size = 4194304     # 4MB

[webdav]
enabled = true
prefix = "/dav"
read_only = false
auth_type = "basic"          # none, basic
username = "admin"           # Basic Auth 用户名（默认 admin）
password = ""                # Basic Auth 密码（留空则首次启动时自动生成并写入 secrets.json）

[auth]
enabled = true               # 启用后所有 API 需要 JWT 认证
jwt_secret = ""              # JWT 签名密钥（留空则自动生成）
access_token_ttl = "15m"     # Access Token 有效期
refresh_token_ttl = "168h"   # Refresh Token 有效期（7天）
users_file = ""              # 用户数据文件路径（默认 ~/.mnemonas/.mnemonas/users.json）

[share]
enabled = false              # 启用文件分享功能
store_file = ""              # 分享数据文件路径（默认 ~/.mnemonas/.mnemonas/shares.json）
base_url = ""                # 分享链接基础 URL（可选，用于生成完整链接）

[favorites]
enabled = true               # 启用收藏功能
store_file = ""              # 收藏数据文件路径（默认 ~/.mnemonas/.mnemonas/favorites.json）

[alerts]
enabled = false              # 启用存储空间告警
check_interval = "1h"        # 检查间隔
threshold_pct = 90.0         # 使用率达到此百分比时发送警告
critical_pct = 95.0          # 使用率达到此百分比时发送严重告警
min_free_bytes = 10737418240 # 剩余空间低于此值时告警（10GB）
cooldown_period = "4h"       # 同级别告警冷却时间
webhook_url = ""             # Webhook URL（如企业微信机器人、Slack 等）
webhook_method = "POST"      # HTTP 方法；GET 时将告警字段编码到 URL query
# webhook_headers = ["Authorization:Bearer xxx"]  # 自定义请求头

[log]
level = "info"               # debug, info, warn, error
format = "console"           # json, console
output = "stdout"            # stdout, stderr, 或文件路径
time_format = "RFC3339"
