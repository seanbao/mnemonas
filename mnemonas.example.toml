[backup]
# Built-in backup jobs are disabled by default. An empty source backs up storage.root; production deployments should prefer a mounted snapshot path.
# Supported type values are local, restic, and rclone. A local destination must not be under storage.root, and existing path components must not be symlinks.
# [[backup.jobs]]
# id = "external-disk"
# name = "External disk backup"
# type = "local"
# source = ""                 # Leave empty to back up storage.root, or set a ZFS/Btrfs/LVM snapshot mount path.
# destination = "/mnt/backup-drive/mnemonas"
# disabled = false            # Temporarily disable this job.
# schedule_interval = "24h"   # Run automatically after startup when greater than 0; 0 or empty means manual only.
# schedule_window_start = "02:00" # Optional local-server-time window start for automatic jobs.
# schedule_window_end = "05:00"   # Supports windows across midnight, such as 22:00 to 06:00.
# stale_after = "72h"         # Mark health as stale after this duration without a successful backup.
# restore_drill_stale_after = "720h" # Warn after this duration without a successful restore drill. Empty defaults to 30 days.
# max_snapshots = 7           # Maximum local snapshots to retain. 0 disables count-based cleanup.
# max_age = "720h"            # Maximum snapshot age. 0 disables age-based cleanup.
# include_config = true       # Also copy the current config.toml.
# verify_after_backup = true  # Verify snapshot file hashes after backup.
# exclude = [".mnemonas/thumbnails"]
#
# [[backup.jobs]]
# id = "restic-remote"
# name = "Restic encrypted backup"
# type = "restic"
# source = "/mnt/snapshots/mnemonas-latest"
# repository = "rest:http://backup.example:8000/mnemonas"
# command = "restic"                       # Absolute paths such as /usr/bin/restic are also allowed.
# password_file = "/etc/mnemonas/restic.pass" # Must be a regular file outside storage.root and source.
# schedule_interval = "24h"
# schedule_window_start = "02:00"
# schedule_window_end = "05:00"
# stale_after = "72h"
# restore_drill_stale_after = "720h"
# retention_policy = "external: restic forget --keep-daily 7 --prune"
# verify_after_backup = true               # Run restic check.
# exclude = [".mnemonas/thumbnails"]
# extra_args = ["--compression", "max"]
#
# [[backup.jobs]]
# id = "rclone-cloud"
# name = "Rclone cloud sync"
# type = "rclone"
# source = "/mnt/snapshots/mnemonas-latest"
# remote = "cloud:mnemonas/current"
# command = "rclone"                       # Absolute paths such as /usr/bin/rclone are also allowed.
# config_file = "/etc/mnemonas/rclone.conf" # Optional; must be a regular file outside storage.root and source.
# schedule_interval = "24h"
# schedule_window_start = "02:00"
# schedule_window_end = "05:00"
# stale_after = "72h"
# restore_drill_stale_after = "720h"
# retention_policy = "external: cloud lifecycle keeps 30 daily versions"
# verify_after_backup = true               # Run rclone check --one-way.
# exclude = [".mnemonas/thumbnails"]
# extra_args = ["--fast-list"]

[maintenance.scrub]
enabled = false              # Run scheduled data-integrity checks in the background.
schedule_interval = "168h"   # Regular Scrub interval. The default is 7 days.
retry_interval = "1h"        # Retry interval after Scrub failure.
max_retries = 1              # Maximum automatic retries after each failure.

[auth]
enabled = true               # Require JWT authentication for all APIs.
jwt_secret = ""              # JWT signing secret. Leave empty to generate one automatically.
access_token_ttl = "15m"     # Access token lifetime.
refresh_token_ttl = "168h"   # Refresh token lifetime. 168h is 7 days.
users_file = ""              # User data file path. Defaults to <storage.root>/.mnemonas/users.json.

[share]
enabled = false              # Enable file sharing.
store_file = ""              # Share data file path. Defaults to <storage.root>/.mnemonas/shares.json.
base_url = ""                # Share-link base URL. Non-empty values must not contain userinfo, query parameters, fragments, encoded query or fragment markers, backslashes, duplicate path slashes, or . / .. path segments.
# Public values should use the HTTPS origin or app base path before /s, with the default 443 port.
default_expires_in = "168h"  # Default expiration for new shares. 0 means no default expiration.
default_max_access = 0       # Default access-count limit for new shares. 0 means unlimited.

# [[share.policy_rules]]
# path = "/Family"
# require_password = true
# max_expires_in = "24h"
# max_access = 20
# allowed_users = ["alice"]
# allowed_groups = ["family"]
# allowed_roles = ["user"]

[favorites]
enabled = true               # Enable favorites.
store_file = ""              # Favorites data file path. Defaults to <storage.root>/.mnemonas/favorites.json.

[alerts]
enabled = false              # Enable storage alerts. When Webhook is configured, backup failure/warning events are also sent.
check_interval = "1h"        # Check interval.
threshold_pct = 90.0         # Send a warning when usage reaches this percentage.
critical_pct = 95.0          # Send a critical alert when usage reaches this percentage.
min_free_bytes = 10737418240 # Alert when free space falls below this value. 10737418240 is 10 GiB.
cooldown_period = "4h"       # Cooldown for repeated alerts at the same severity.
webhook_url = ""             # Webhook URL, such as a WeCom bot or Slack webhook.
webhook_method = "POST"      # HTTP method. GET encodes alert fields into the URL query.
webhook_headers = []         # Custom request headers. Names must be valid HTTP header tokens, and values must not contain newlines or control characters.
telegram_enabled = false     # Enable Telegram bot notifications.
telegram_bot_token = ""      # Telegram Bot Token. Stored only in config and not returned in diagnostics or settings responses.
telegram_chat_id = ""        # Telegram Chat ID or @channel username.
wecom_enabled = false        # Enable WeCom group bot notifications.
wecom_webhook_url = ""       # WeCom group bot Webhook URL. Not returned in diagnostics or settings responses.
dingtalk_enabled = false     # Enable DingTalk group bot notifications.
dingtalk_webhook_url = ""    # DingTalk group bot Webhook URL. Not returned in diagnostics or settings responses.
email_enabled = false        # Enable SMTP email notifications.
smtp_host = ""               # SMTP host name without a port.
smtp_port = 587              # SMTP port.
smtp_username = ""           # SMTP username.
smtp_password = ""           # SMTP password or app-specific password.
smtp_from = ""               # Sender address.
smtp_to = []                 # Recipient address list.

[disk_health]
enabled = false
check_interval = "1h"
probe_timeout = "15s"
cooldown_period = "4h"
command = "smartctl"
temperature_warning_c = 50
temperature_critical_c = 60
media_wear_warning_percent = 80
media_wear_critical_percent = 100

# [[disk_health.devices]]
# name = "data-disk"
# path = "/dev/disk/by-id/ata-example"
# type = "sat"
# serial = ""

[security]
allow_unsafe_no_auth = false  # Set to true only after explicitly accepting unauthenticated non-loopback exposure risk.

[log]
level = "info"               # debug, info, warn, error
format = "console"           # json, console
output = "stdout"            # stdout, stderr, or a file path.
time_format = "2006-01-02T15:04:05Z07:00"
