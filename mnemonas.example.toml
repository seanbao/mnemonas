[backup]
# 默认不启用内置备份任务。source 留空表示备份 storage.root；生产环境更建议填快照挂载目录。
# type 支持 local、restic、rclone。local 的 destination 不能位于 storage.root 内，且已存在路径组件不能是符号链接。
# [[backup.jobs]]
# id = "external-disk"
# name = "外置硬盘备份"
# type = "local"
# source = ""                 # 留空表示备份 storage.root；也可以填写 ZFS/Btrfs/LVM 快照挂载目录
# destination = "/mnt/backup-drive/mnemonas"
# disabled = false            # 临时停用该任务
# schedule_interval = "24h"    # 大于 0 时服务启动后自动按间隔执行；0 或留空表示仅手动执行
# schedule_window_start = "02:00" # 可选；自动任务只在服务器本地时间窗口内启动
# schedule_window_end = "05:00"   # 支持跨午夜，例如 22:00 到 06:00
# stale_after = "72h"          # 超过该时间没有成功备份时，健康状态显示为过期
# restore_drill_stale_after = "720h" # 超过该时间没有成功恢复演练时提醒；留空默认 30 天
# max_snapshots = 7            # 最多保留的本地快照数；0 表示不按数量清理
# max_age = "720h"             # 快照最长保留时间；0 表示不按时间清理
# include_config = true       # 同时复制当前 config.toml
# verify_after_backup = true  # 备份完成后校验快照文件哈希
# exclude = [".mnemonas/thumbnails"]
