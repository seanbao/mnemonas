[maintenance.scrub]
enabled = false              # 启用后后台按计划执行数据完整性校验
schedule_interval = "168h"   # 常规 Scrub 间隔（默认 7 天）
retry_interval = "1h"        # Scrub 失败后的重试间隔
max_retries = 1              # 每次失败后最多自动重试次数

[auth]
enabled = true               # 启用后所有 API 需要 JWT 认证
jwt_secret = ""              # JWT 签名密钥（留空则自动生成）
access_token_ttl = "15m"     # Access Token 有效期
refresh_token_ttl = "168h"   # Refresh Token 有效期（7天）
users_file = ""              # 用户数据文件路径（默认 <storage.root>/.mnemonas/users.json）

[share]
enabled = false              # 启用文件分享功能
store_file = ""              # 分享数据文件路径（默认 <storage.root>/.mnemonas/shares.json）
base_url = ""                # 分享链接基础 URL；非空时不能包含 userinfo、查询参数或片段
default_expires_in = "168h"  # 新建分享默认有效期；0 表示默认不过期
default_max_access = 0       # 新建分享默认访问次数上限；0 表示不限制

# [[share.policy_rules]]
# path = "/Family"
# require_password = true
# max_expires_in = "24h"
# max_access = 20

[favorites]
enabled = true               # 启用收藏功能
store_file = ""              # 收藏数据文件路径（默认 <storage.root>/.mnemonas/favorites.json）

[alerts]
enabled = false              # 启用存储空间告警；配置 Webhook 后也会发送备份失败/警告事件
check_interval = "1h"        # 检查间隔
threshold_pct = 90.0         # 使用率达到此百分比时发送警告
critical_pct = 95.0          # 使用率达到此百分比时发送严重告警
min_free_bytes = 10737418240 # 剩余空间低于此值时告警（10GB）
cooldown_period = "4h"       # 同级别告警冷却时间
webhook_url = ""             # Webhook URL（如企业微信机器人、Slack 等）
webhook_method = "POST"      # HTTP 方法；GET 时将告警字段编码到 URL query
webhook_headers = []         # 自定义请求头；名称必须是合法 HTTP header token，值不能包含换行或控制字符
telegram_enabled = false     # 启用 Telegram 机器人通知
telegram_bot_token = ""      # Telegram Bot Token；仅写入配置文件，不会在诊断或设置响应中明文返回
telegram_chat_id = ""        # Telegram Chat ID 或 @channel 用户名
wecom_enabled = false        # 启用企业微信/WeCom 群机器人通知
wecom_webhook_url = ""       # 企业微信群机器人 Webhook URL；不会在诊断或设置响应中明文返回
dingtalk_enabled = false     # 启用钉钉群机器人通知
dingtalk_webhook_url = ""    # 钉钉群机器人 Webhook URL；不会在诊断或设置响应中明文返回
email_enabled = false        # 启用 SMTP 邮件通知
smtp_host = ""               # SMTP 主机名，不包含端口
smtp_port = 587              # SMTP 端口
smtp_username = ""           # SMTP 用户名
smtp_password = ""           # SMTP 密码或应用专用密码
smtp_from = ""               # 发件人地址
smtp_to = []                 # 收件人地址列表

[disk_health]
enabled = false
check_interval = "1h"
probe_timeout = "15s"
cooldown_period = "4h"
command = "smartctl"
temperature_warning_c = 50
temperature_critical_c = 60
media_wear_warning_percent = 80
media_wear_critical_percent = 100

# [[disk_health.devices]]
# name = "data-disk"
# path = "/dev/disk/by-id/ata-example"
# type = "sat"
# serial = ""

[security]
allow_unsafe_no_auth = false  # 仅在明确接受非 loopback 无认证暴露风险时才设为 true

[log]
level = "info"               # debug, info, warn, error
format = "console"           # json, console
output = "stdout"            # stdout, stderr, 或文件路径
time_format = "RFC3339"
