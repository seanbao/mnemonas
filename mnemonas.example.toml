# MnemoNAS example configuration file.

[server]
host = "0.0.0.0"
port = 8080
read_timeout = "30s"
write_timeout = "60s"
idle_timeout = "120s"
trusted_proxy_hops = 0        # Do not trust X-Forwarded-* by default; set this to the actual proxy hop count behind reverse proxies.
trusted_proxy_cidrs = []      # Non-loopback direct reverse-proxy sources, such as Docker bridge or private load-balancer CIDRs.

[server.tls]
enabled = false              # Enable HTTPS.
cert_file = ""               # Certificate path; leave empty to use server.crt under cert_dir.
key_file = ""                # Private-key path; leave empty to use server.key under cert_dir.
auto_generate = true         # Generate a self-signed certificate for LAN or development use.
cert_dir = ""                # Certificate directory; defaults to <storage.root>/.mnemonas/certs.

[storage]
# Storage root. The default is ~/.mnemonas and does not require root privileges.
root = "~/.mnemonas"
# directory_quotas = [
#   { path = "/team", quota_bytes = 1099511627776 },
# ]
# directory_access_rules = [
#   { path = "/team", read_groups = ["family"], write_groups = ["editors"] },
# ]

[storage.retention]
max_versions = 50            # Maximum versions retained per file.
max_age = "2160h"            # Retain versions for 90 days.
min_free_space = 10737418240 # Keep at least 10 GiB free.
gc_interval = "24h"          # Run version cleanup every 24 hours.

[storage.versioning]
auto_versioned_extensions = [
  ".md", ".txt", ".org", ".rst", ".tex",
  ".go", ".rs", ".py", ".ts", ".js", ".tsx", ".jsx",
  ".c", ".cpp", ".h", ".java", ".kt", ".swift",
  ".toml", ".yaml", ".yml", ".json", ".xml",
  ".sh", ".bash", ".zsh", ".fish",
]
auto_versioned_filenames = [
  "Makefile", "Dockerfile", "Vagrantfile",
  "LICENSE", "README", "CHANGELOG",
  ".gitignore", ".dockerignore", ".editorconfig",
]
max_versioned_size = 104857600 # 100 MiB.

[storage.trash]
enabled = true
retention_days = 30
max_size = 10737418240         # 10 GiB.

[dataplane]
grpc_address = "127.0.0.1:9090"
timeout = "30s"
max_retries = 3

[dataplane.cdc]
min_chunk_size = 262144      # 256 KiB.
avg_chunk_size = 1048576     # 1 MiB.
max_chunk_size = 4194304     # 4 MiB.

[webdav]
enabled = true
prefix = "/dav"              # Must not be /, /api, /s, /health, or a child path of those reserved routes.
read_only = false
auth_type = "basic"          # users, basic, none
username = "admin"           # Basic Auth username. The default is admin.
password = ""                # Basic Auth password. Leave empty to generate a readable 16-character password in secrets.json on first startup.

[smb]
# Preview configuration. Current builds do not start an SMB/Samba listener; use WebDAV for LAN mounts.
enabled = false
listen = "127.0.0.1:1445"    # Bind to 445 through a proxy or port forward; unprivileged processes usually cannot listen on 445 directly.
server_name = "mnemonas"
gateway_socket = ""          # Defaults to <storage.root>/.mnemonas/run/smb-gateway.sock.
credential_file = ""         # Defaults to <storage.root>/.mnemonas/smb-credentials.json and is separate from Web login passwords.
signing_required = true
encryption_required = false

