# MnemoNAS 配置文件示例

[server]
host = "0.0.0.0"
port = 8080
read_timeout = "30s"
write_timeout = "60s"
idle_timeout = "120s"
trusted_proxy_hops = 0        # 默认不信任 X-Forwarded-*；反向代理后方部署时设置为实际代理层数
trusted_proxy_cidrs = []      # 非 loopback 反向代理直连来源；如 Docker 网桥或内网负载均衡 CIDR

[server.tls]
enabled = false              # 启用 HTTPS
cert_file = ""               # 证书文件路径（留空使用 cert_dir 下的 server.crt）
key_file = ""                # 私钥文件路径（留空使用 cert_dir 下的 server.key）
auto_generate = true         # 自动生成自签名证书（适合内网/开发环境）
cert_dir = ""                # 证书存放目录（默认 <storage.root>/.mnemonas/certs）

[storage]
# 存储根目录，默认 ~/.mnemonas（无需 root 权限）
root = "~/.mnemonas"
# directory_quotas = [
#   { path = "/team", quota_bytes = 1099511627776 },
# ]
# directory_access_rules = [
#   { path = "/team", read_groups = ["family"], write_groups = ["editors"] },
# ]

[storage.retention]
max_versions = 50            # 每个文件最多保留50个版本
max_age = "2160h"            # 版本保留90天
min_free_space = 10737418240 # 最少保留10GB空闲空间
gc_interval = "24h"          # 每24小时运行一次版本清理

[storage.versioning]
auto_versioned_extensions = [
  ".md", ".txt", ".org", ".rst", ".tex",
  ".go", ".rs", ".py", ".ts", ".js", ".tsx", ".jsx",
  ".c", ".cpp", ".h", ".java", ".kt", ".swift",
  ".toml", ".yaml", ".yml", ".json", ".xml",
  ".sh", ".bash", ".zsh", ".fish",
]
auto_versioned_filenames = [
  "Makefile", "Dockerfile", "Vagrantfile",
  "LICENSE", "README", "CHANGELOG",
  ".gitignore", ".dockerignore", ".editorconfig",
]
max_versioned_size = 104857600 # 100MB

[storage.trash]
enabled = true
retention_days = 30
max_size = 10737418240         # 10GB

[dataplane]
grpc_address = "127.0.0.1:9090"
timeout = "30s"
max_retries = 3

[dataplane.cdc]
min_chunk_size = 262144      # 256KB
avg_chunk_size = 1048576     # 1MB
max_chunk_size = 4194304     # 4MB

[webdav]
enabled = true
prefix = "/dav"              # 不能使用 /、/api、/s、/health 或这些保留路由的子路径
read_only = false
auth_type = "basic"          # users, basic, none
username = "admin"           # Basic Auth 用户名（默认 admin）
password = ""                # Basic Auth 密码（留空则首次启动时生成 16 字符可读密码并写入 secrets.json）

[smb]
# 预览配置：当前版本不会启动 SMB/Samba 监听器；局域网挂载请继续使用 WebDAV。
enabled = false
listen = "127.0.0.1:1445"    # 建议由反向代理/端口转发绑定到 445；普通用户进程默认不能直接监听 445
server_name = "mnemonas"
gateway_socket = ""          # 默认 <storage.root>/.mnemonas/run/smb-gateway.sock
credential_file = ""         # 默认 <storage.root>/.mnemonas/smb-credentials.json，独立于 Web 登录密码
signing_required = true
encryption_required = false

# [[smb.shares]]
# name = "homes"
# path = "/"                  # MnemoNAS 内部绝对路径；非管理员仍受 home_dir 约束
# read_only = false
# allowed_roles = ["admin", "user"]
