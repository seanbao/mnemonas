name: mnemonas_client
description: "Cross-platform client for MnemoNAS."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.1
  crypto: ^3.0.7
  dio: ^5.10.0
  file_selector: ^1.1.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  intl: ^0.20.2
  mime: ^2.0.0
  open_filex: ^4.7.0
  package_info_plus: ^10.2.1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
