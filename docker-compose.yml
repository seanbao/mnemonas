services:
  mnemonas:
    image: ${MNEMONAS_IMAGE:-mnemonas:local}
    build:
      context: .
      args:
        RUST_IMAGE: ${RUST_IMAGE:-rust:1.92}
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        GO_IMAGE: ${GO_IMAGE:-golang:1.25.12-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-debian:bookworm-slim}
        VERSION: ${MNEMONAS_VERSION:-local}
        BUILD_TIME: ${MNEMONAS_BUILD_TIME:-unknown}
    user: "${MNEMONAS_UID:-1000}:${MNEMONAS_GID:-1000}"
    init: true
    ports:
      - "${MNEMONAS_HTTP_PORT:-8080}:8080"    # Web UI + API + WebDAV
    volumes:
      - type: bind
        source: ${MNEMONAS_DATA_DIR:-${HOME}/.mnemonas}
        target: /data
        bind:
          create_host_path: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/mnemonas-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
